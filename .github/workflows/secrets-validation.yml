name: secrets-validation

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secret references exist in config
        shell: pwsh
        run: |
          $config = Get-Content InTimeProAPI/appsettings.json -Raw | ConvertFrom-Json
          $refs = @(
            $config.Secrets.JwtSecretRef,
            $config.Secrets.GoogleClientSecretRef,
            $config.Secrets.MicrosoftClientSecretRef
          )

          foreach ($ref in $refs) {
            if ([string]::IsNullOrWhiteSpace($ref)) {
              throw "Missing required secret reference in appsettings.json"
            }
          }

          Write-Host "Secret reference validation passed"
